version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matrukavach-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-gemini_api_key}
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads

  telegram-poller:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matrukavach-telegram-poller
    restart: always
    command: python telegram_poller.py
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-pk_test_Y3VyaW91cy1zdGFsbGlvbi01NC5jbGVyay5hY2NvdW50cy5kZXYk}
        - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:-sk_test_FfRdPHqLnDHto2pxO8kN0VyXDFsSZvDClwj7lvoWMd}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: matrukavach-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-pk_test_Y3VyaW91cy1zdGFsbGlvbi01NC5jbGVyay5hY2NvdW50cy5kZXYk}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:-sk_test_FfRdPHqLnDHto2pxO8kN0VyXDFsSZvDClwj7lvoWMd}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend

volumes:
  backend-data:
    driver: local
  backend-uploads:
    driver: local
